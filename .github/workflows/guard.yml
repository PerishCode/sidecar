name: guard

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: guard-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    strategy:
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned negentropy
        run: |
          curl -fsSL https://releases.negentropy.perish.uk/manage.sh | sh -s -- install --channel stable --version $(cat .runseal/negentropy.version) --bin-dir $HOME/.local/bin
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Guard
        run: deno run --allow-read --allow-write --allow-env --allow-net --allow-run --config .runseal/deno.json --lock .runseal/deno.lock --frozen=true .runseal/wrappers/guard.ts
